<!DOCTYPE html>
<html>
<head>
  <title>Camily Sousa | Portfolio</title>

  <style>
    body {
      background: #ffe6f0; /* rosinha claro */
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      text-align: center;
      background: white;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      margin-bottom: 15px;
      object-fit: cover;
    }

    h1 {
      margin: 5px 0;
      font-size: 22px;
      color: #cc0066; /* rosa mais escuro */
    }

    p {
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    a {
      display: block;
      margin: 8px 0;
      text-decoration: none;
      color: black;
      border: 1px solid #ffb3d9;
      padding: 10px;
      border-radius: 8px;
      transition: 0.2s;
    }

    a:hover {
      background: #ffd6eb;
    }
  </style>
</head>

<body>

  <div class="card">

    <img src="foto.jpg" alt="Minha foto">

    <h1>Camily Sousa</h1>
    <p>👩‍💻 Frontend learner building projects from scratch.</p>

    <a href="https://github.com/mihmanuely1" target="_blank">💻 GitHub</a>

    <a href="https://www.linkedin.com/in/camily-sousa-628b99372" target="_blank">💼 LinkedIn</a>

    <a href="https://instagram.com/mihmanuely" target="_blank">📷 Instagram</a>

  </div>

</body>
</html>
